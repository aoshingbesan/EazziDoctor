<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./images/Avatar.png" type="image/png">
    <title>EazziDoctor — Log In</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <!-- Left: image -->
    <div class="left-panel"></div>

    <!-- Right: form -->
    <div class="right-panel">
        <div class="login-container">

            <div class="logo">
                <img src="./images/Logo.png" alt="EazziDoctor">
            </div>

            <h1>Welcome back</h1>
            <p class="subtitle">Log in to manage your health and appointments.</p>

            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
                    <span class="error-msg" id="email-error"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">👁</button>
                    </div>
                    <span class="error-msg" id="password-error"></span>
                </div>

                <div class="forgot-row">
                    <a href="#">Forgot password?</a>
                </div>

                <span class="error-msg" id="form-error"></span>
                <button type="submit" class="login-button">Log In</button>
                <p class="alternative">Don't have an account? <a href="./index.html">Sign Up</a></p>
            </form>

        </div>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function () {
            const input = document.getElementById('password');
            input.type = input.type === 'password' ? 'text' : 'password';
            this.textContent = input.type === 'password' ? '👁' : '🙈';
        });

        // Supabase
        const supabaseUrl = 'https://woodcilxiuaemofemjtd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indvb2RjaWx4aXVhZW1vZmVtanRkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNzYyOTgsImV4cCI6MjA4ODc1MjI5OH0.3bXgZhXVk6coW72q6cDuGewd4sNHZamFMBBOBU7yMBs';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        function showError(id, msg) {
            const el = document.getElementById(id);
            if (el) el.textContent = msg;
        }
        function clearErrors() {
            ['email-error', 'password-error', 'form-error'].forEach(id => showError(id, ''));
            ['email', 'password'].forEach(id => {
                document.getElementById(id)?.classList.remove('input-error');
            });
        }

        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            clearErrors();
            const emailVal = document.getElementById('email').value.trim();
            const passwordVal = document.getElementById('password').value;
            let valid = true;

            if (!emailVal) {
                showError('email-error', 'Email is required.');
                document.getElementById('email').classList.add('input-error');
                valid = false;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)) {
                showError('email-error', 'Please enter a valid email address.');
                document.getElementById('email').classList.add('input-error');
                valid = false;
            }
            if (!passwordVal) {
                showError('password-error', 'Password is required.');
                document.getElementById('password').classList.add('input-error');
                valid = false;
            }
            if (!valid) return;

            const btn = document.querySelector('.login-button');
            btn.textContent = 'Logging in...';
            btn.disabled = true;

            try {
                const { data, error } = await client.auth.signInWithPassword({ email: emailVal, password: passwordVal });
                if (error) {
                    showError('form-error', error.message);
                    btn.textContent = 'Log In';
                    btn.disabled = false;
                } else {
                    window.location.href = './dashboard.html';
                }
            } catch (err) {
                showError('form-error', 'An unexpected error occurred. Please try again.');
                btn.textContent = 'Log In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
